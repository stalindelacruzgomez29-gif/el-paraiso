<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carta · El Paraíso Bar Restaurante</title>
<link rel="manifest" href="/carta.webmanifest">
<meta name="theme-color" content="#123f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carta Paraíso">
<link rel="apple-touch-icon" href="/carta-icono-180.png">
<link rel="icon" href="/carta-icono-192.png">
<style>
  :root{
    --verde:#123f2e; --verde-hoja:#1d5a41; --oro:#b4884a; --oro-claro:#cba15f;
    --papel:#f6efe0; --papel-2:#efe6d2; --tinta:#2a2a24; --tinta-suave:#6b6656; --linea:#d8ccb0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--papel);color:var(--tinta);font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;line-height:1.45}
  .lienzo{max-width:860px;margin:0 auto;position:relative;z-index:1}
  /* Logo de El Paraíso como marca de agua difuminada: FIJA, aparece en TODAS las hojas */
  .marca-agua{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:url('/logo-paraiso-oficial.png') center center / 58% auto no-repeat;
    opacity:.12;filter:blur(1px);
  }
  main{position:relative;z-index:1}
  main .cols{position:relative;z-index:1}

  .barra-print{text-align:center;padding:12px;background:var(--verde-hoja);color:#fff;font-family:Georgia,serif;font-size:14px}
  .barra-print button{background:var(--oro);color:#2a1c08;border:0;padding:9px 18px;border-radius:8px;font-weight:700;cursor:pointer;margin-left:8px}

  /* PORTADA */
  .portada{background:radial-gradient(120% 80% at 50% -10%, #1a5540 0%, var(--verde) 55%, #0d3123 100%);
    color:var(--papel);text-align:center;padding:56px 30px 46px;border-bottom:6px double var(--oro)}
  .emblema{width:104px;height:104px;margin:0 auto 18px;display:block}
  .marca{font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:var(--oro-claro);margin-bottom:12px;font-family:Georgia,serif}
  .titulo{font-size:clamp(38px,10vw,60px);line-height:.98;font-weight:400;letter-spacing:.02em}
  .titulo .the{display:block;font-size:.34em;letter-spacing:.55em;color:var(--oro-claro);margin-bottom:.35em;text-transform:uppercase}
  .desde{display:inline-block;margin-top:16px;padding:6px 20px;border:1px solid var(--oro);border-radius:40px;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--oro-claro);font-family:Georgia,serif}
  .lema{margin-top:16px;font-style:italic;font-size:17px;color:#e9dfc6}

  main{padding:34px 30px 16px}
  /* doble columna para aprovechar el papel */
  .cols{column-count:2;column-gap:34px}
  @media(max-width:640px){.cols{column-count:1}}

  .seccion{break-inside:avoid;margin-bottom:26px;display:inline-block;width:100%}
  .cab{text-align:center;margin-bottom:12px}
  .cab h2{font-size:21px;font-weight:400;color:var(--verde);letter-spacing:.03em;display:inline-flex;align-items:center;gap:12px}
  .cab h2::before,.cab h2::after{content:"";width:24px;height:1px;background:var(--oro);opacity:.7}
  .cab .en{display:block;margin-top:3px;font-family:Georgia,serif;font-style:italic;font-size:12px;color:var(--tinta-suave)}

  .plato{padding:8px 0;border-bottom:1px dotted var(--linea);break-inside:avoid}
  .plato:last-child{border-bottom:none}
  .fila{display:grid;grid-template-columns:1fr auto;gap:4px 12px;align-items:baseline}
  .pl-nom{font-size:15.5px;color:var(--tinta)}
  .pl-en{font-family:Georgia,serif;font-style:italic;font-size:11.5px;color:var(--tinta-suave)}
  .pl-desc{font-family:Georgia,serif;font-size:11.5px;color:var(--tinta-suave);line-height:1.4;margin-top:1px}
  .pl-precio{font-size:14.5px;color:var(--verde);font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums;text-align:right}
  .pl-precio .multi{font-size:11px;color:var(--oro);font-weight:400}
  /* plato con foto */
  .con-foto{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center}
  .con-foto .foto{width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--linea)}

  .premium{background:linear-gradient(160deg,#fbf6ea,#f1e7cf);border:1px solid var(--oro);border-radius:14px;padding:18px 18px 8px}
  .premium .pl-nom{font-weight:700}
  .estrella{color:var(--oro);font-size:11px;letter-spacing:.3em;text-transform:uppercase;display:block;text-align:center;margin-bottom:6px}
  .kids{background:var(--papel-2);border-radius:12px;padding:16px 18px}

  /* PROMOCIONES: un apartado más de la carta, con la misma cabecera que las secciones
     (solo pantalla: no sale al imprimir, el PDF de la carta no cambia) */
  .promos-zona{padding:26px 30px 0}
  .promos-zona .cab{margin-bottom:14px}
  .promos-lista{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .promos-lista::-webkit-scrollbar{height:5px}
  .promos-lista::-webkit-scrollbar-thumb{background:rgba(180,136,74,.45);border-radius:999px}
  .promo-card{scroll-snap-align:start;flex:0 0 240px;background:linear-gradient(150deg,#1a5540,var(--verde) 70%);color:var(--papel);border:1px solid var(--oro);border-radius:14px;padding:16px 18px;box-shadow:0 8px 20px rgba(18,63,46,.25)}
  .promo-card.sola{flex:1 1 auto}
  .promo-nom{font-size:17px;color:var(--oro-claro);line-height:1.25}
  .promo-en{font-family:Georgia,serif;font-style:italic;font-size:11.5px;color:#cdbf9f;margin-top:2px}
  .promo-desc{font-family:Georgia,serif;font-size:12.5px;color:#e9dfc6;margin-top:6px;line-height:1.4}
  .promo-precio{margin-top:10px;font-size:20px;font-weight:700;color:var(--oro-claro);font-variant-numeric:tabular-nums}
  /* botón para activar los avisos de promociones */
  .avisos-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(203,161,95,.14);border:1px solid var(--oro);color:var(--oro-claro);padding:9px 16px;border-radius:30px;font-family:-apple-system,sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:16px}
  .avisos-btn:disabled{opacity:.75;cursor:default}

  .pie{background:var(--verde);color:var(--papel);text-align:center;padding:28px 30px 34px;margin-top:14px;border-top:6px double var(--oro)}
  .pie .datos{display:flex;justify-content:center;gap:12px 26px;flex-wrap:wrap;font-size:14px}
  .pie .datos b{color:var(--oro-claro);font-weight:400}
  .pie .alerg{margin-top:14px;font-family:Georgia,serif;font-style:italic;font-size:11.5px;color:#cdbf9f;max-width:520px;margin:14px auto 0;line-height:1.5}
  .pie .grx{margin-top:12px;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--oro-claro)}
  .redes{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:16px}
  .redes a{display:inline-flex;align-items:center;gap:6px;background:rgba(203,161,95,.14);border:1px solid var(--oro);color:var(--oro-claro);
    padding:8px 15px;border-radius:30px;font-family:-apple-system,sans-serif;font-size:13.5px;font-weight:600;text-decoration:none}
  .redes a:hover{background:rgba(203,161,95,.26)}
  /* PESTAÑAS de la app: 🌴 Carta · 🎉 Promos (solo pantalla) */
  body{padding-bottom:78px}
  html,body{overflow-x:hidden}
  .tabs{position:fixed;left:8px;right:8px;bottom:14px;z-index:55;display:flex;gap:4px;
    max-width:430px;margin:0 auto;justify-content:space-between;
    background:var(--verde);border:1px solid var(--oro);border-radius:999px;padding:5px;box-shadow:0 10px 26px rgba(0,0,0,.30)}
  .tab{flex:1;border:0;background:transparent;color:#e9dfc6;font-family:Georgia,serif;font-size:13.5px;padding:9px 4px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;min-width:0}
  .tab.act{background:var(--oro);color:#2a1c08;font-weight:700}
  .tab .num{background:#9b2c2c;color:#fff;font-size:10.5px;border-radius:999px;padding:1px 6px;font-family:-apple-system,sans-serif;font-weight:700}
  /* vista de la pestaña Promos */
  .vista-promos{display:none;max-width:860px;margin:0 auto;padding:30px 22px 26px;position:relative;z-index:1}
  .vista-promos.act{display:block}
  .vista-promos .promo-card{flex:none;width:100%;max-width:520px;margin:0 auto 14px}
  .vp-estado{display:inline-block;margin-top:9px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-family:Georgia,serif;
    border:1px solid var(--oro);border-radius:999px;padding:3px 11px;color:var(--oro-claro)}
  .vp-estado.ahora{background:var(--oro);color:#2a1c08;font-weight:700}
  .vp-vacio{text-align:center;color:var(--tinta-suave);font-family:Georgia,serif;font-style:italic;padding:26px 10px;line-height:1.6}

  /* aviso instalar app */
  .instalar{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);z-index:60;background:var(--verde);color:#fff;
    display:none;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;box-shadow:0 8px 26px rgba(0,0,0,.3);font-family:-apple-system,sans-serif;max-width:92vw}
  .instalar img{width:38px;height:38px;border-radius:9px}
  .instalar .txt{font-size:13.5px;line-height:1.3}
  .instalar b{color:var(--oro-claro)}
  .instalar button{background:var(--oro);color:#2a1c08;border:0;padding:9px 15px;border-radius:9px;font-weight:700;cursor:pointer;white-space:nowrap}
  .instalar .cerrar{background:transparent;color:#cdbf9f;font-size:20px;padding:0 4px}

  @media print{
    @page{size:A4;margin:9mm}
    body{background:#fff;padding-bottom:0}
    .tabs,.vista-promos{display:none!important}
    .lienzo{display:block!important}
    .lienzo{max-width:none}
    .no-print{display:none!important}
    .portada,.pie,.premium,.kids,.con-foto .foto,.marca-agua{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .marca-agua{opacity:.13}   /* se repite en cada hoja al imprimir (elemento fijo) */
    main{padding:16px 6px 6px}
    .cols{column-gap:22px}
    .seccion{margin-bottom:16px}
    .portada{padding:26px 20px 22px}
    .emblema{width:74px;height:74px}
  }
</style>
</head>

<div class="marca-agua"></div>

<script>
const ID_CARTA = "4244bca40f5248ee217447ae96196df2b63dd8d0c83bad2e01995251a87329ba";
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// Los botones de gestión (imprimir/editar) SOLO para Stalin: aparecen con ?gestion en la URL.
// El cliente que escanea el QR abre la URL limpia y ve solo la carta.
const ES_GESTION = /[?&]gestion/i.test(location.search);
if(ES_GESTION){ localStorage.setItem('carta_gestion','1'); }
if(ES_GESTION || localStorage.getItem('carta_gestion')==='1'){
  const b=document.getElementById('barra-gestion'); if(b) b.style.display='block';
}

function emblemaSVG(){
  return `<svg class="emblema" viewBox="0 0 120 120" aria-hidden="true">
    <circle cx="60" cy="60" r="57" fill="none" stroke="#b4884a" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#b4884a" stroke-width=".6" opacity=".6"/>
    <g fill="#cba15f"><path d="M60 92c-2-14-3-26-2-40l4 0c1 14 0 26-2 40z"/>
    <path d="M60 50c-10-9-22-11-32-6 9-1 19 2 27 9-11-4-22-2-30 5 10-4 20-3 29 3-9 1-17 6-21 14 8-8 18-11 27-9-4-6-3-13 0-20z"/>
    <path d="M60 50c10-9 22-11 32-6-9-1-19 2-27 9 11-4 22-2 30 5-10-4-20-3-29 3 9 1 17 6 21 14-8-8-18-11-27-9 4-6 3-13 0-20z" opacity=".8"/>
    <circle cx="60" cy="47" r="4"/></g></svg>`;
}
function platoHTML(p){
  const filaTxt = `<div class="fila"><div><div class="pl-nom">${esc(p.nom)}${p.en?' <span class="pl-en">· '+esc(p.en)+'</span>':''}</div>${p.desc?'<div class="pl-desc">'+esc(p.desc)+'</div>':''}</div>
    <div class="pl-precio">${esc(p.precio)}</div></div>`;
  if(p.foto) return `<div class="plato"><div class="con-foto"><img class="foto" src="${p.foto}" alt="${esc(p.nom)}">${filaTxt}</div></div>`;
  return `<div class="plato">${filaTxt}</div>`;
}
function seccionHTML(s){
  const clase = s.estilo==='premium'?'seccion premium':(s.estilo==='kids'?'seccion kids':'seccion');
  return `<section class="${clase}">
    ${s.nota?'<span class="estrella">'+esc(s.nota)+'</span>':''}
    <div class="cab"><h2>${esc(s.titulo)}${s.en?'<span class="en">'+esc(s.en)+'</span>':''}</h2></div>
    ${(s.platos||[]).map(platoHTML).join('')}
  </section>`;
}
let CARTA_ACTUAL = window.CARTA_DEFECTO;
function pintar(c){
  CARTA_ACTUAL = c;
  document.title = 'Carta · '+(c.nombre||'El Paraíso');
  document.getElementById('lienzo').innerHTML = `
    <header class="portada">${emblemaSVG()}
      <div class="marca">Bar · Restaurante</div>
      <h1 class="titulo"><span class="the">El</span>${esc((c.nombre||'El Paraíso').replace(/^El\s+/i,'').toUpperCase())}</h1>
      <div class="desde">Desde ${esc(c.desde||'1968')}</div>
      <p class="lema">${esc(c.lema||'')}</p>
    </header>
    ${promosHTML(c.promos)}
    <main><div class="cols">${(c.secciones||[]).map(seccionHTML).join('')}</div></main>
    <footer class="pie">
      <div class="datos">${c.contacto&&c.contacto.tel?'<span>📞 <b>'+esc(c.contacto.tel)+'</b></span>':''}
        ${c.contacto&&c.contacto.horario?'<span>🕗 <b>'+esc(c.contacto.horario)+'</b></span>':''}
        ${c.contacto&&c.contacto.web?'<span>🌐 <b>'+esc(c.contacto.web)+'</b></span>':''}</div>
      ${redesHTML(c.contacto&&c.contacto.redes)}
      <button class="avisos-btn no-print" id="btn-avisos">🔔 Avísame de las promociones</button>
      <p class="alerg">Si tienes alguna alergia o intolerancia alimentaria, pregunta a nuestro personal. · Please inform our staff of any food allergy or intolerance. IVA incluido.</p>
      <div class="grx">El Paraíso · Desde ${esc(c.desde||'1968')}</div>
    </footer>`;
  pintarVistaPromos();
}

// ── PESTAÑA "🎉 PROMOS": todas las promos del día, dentro de la misma app ──
function pintarVistaPromos(){
  const cont=document.getElementById('vista-promos'); if(!cont) return;
  const todas=(CARTA_ACTUAL.promos||[]).filter(p=>p&&p.titulo&&p.activa!==false&&!promoCaducada(p));
  const enVivo=p=>promoEnDia(p)&&promoEnHora(p);
  const ahora=todas.filter(enVivo);
  // numerito rojo de la pestaña: promos activas EN ESTE MOMENTO
  const num=document.getElementById('tab-num');
  if(num){ num.textContent=ahora.length; num.style.display=ahora.length?'inline-block':'none'; }
  // primero las de ahora mismo, luego las que vienen (otro día u otra hora)
  const orden=[...todas].sort((a,b)=>(enVivo(b)?1:0)-(enVivo(a)?1:0));
  cont.innerHTML = `
    <div class="cab" style="margin-bottom:18px"><h2>Promociones<span class="en">Offers · El Paraíso</span></h2></div>
    ${orden.length ? orden.map(p=>`
      <div class="promo-card">
        ${p.icono?'<div style="font-size:30px;line-height:1;margin-bottom:8px">'+esc(p.icono)+'</div>':''}
        <div class="promo-nom" style="font-size:19px">${esc(p.titulo)}</div>
        ${p.en?'<div class="promo-en">'+esc(p.en)+'</div>':''}
        ${p.desc?'<div class="promo-desc">'+esc(p.desc)+'</div>':''}
        ${p.precio?'<div class="promo-precio">'+esc(conEuro(p.precio))+'</div>':''}
        ${estadoPromoVista(p)}
      </div>`).join('')
    : `<div class="vp-vacio">Ahora mismo no hay promociones…<br>¡pero pronto llegará la próxima! 🌴</div>`}
    <div style="text-align:center;margin-top:8px">
      <button class="avisos-btn">🔔 Avísame de las promociones</button>
    </div>`;
  estadoAvisos();
}
window.verPestana=cual=>{
  const esPromos = cual==='promos';
  document.getElementById('lienzo').style.display = esPromos?'none':'';
  document.getElementById('vista-promos').classList.toggle('act',esPromos);
  document.getElementById('tab-carta').classList.toggle('act',!esPromos);
  document.getElementById('tab-promos').classList.toggle('act',esPromos);
  window.scrollTo({top:0});
  if(esPromos) pintarVistaPromos();
};
// Promo con horario diario (ej. 17:00–19:00): solo se enseña dentro de su hora.
// La carta se refresca sola cada minuto, así que se enciende y se apaga en tiempo real.
function promoEnHora(p){
  if(!p.desde||!p.hasta) return true;
  const [h1,m1]=String(p.desde).split(':').map(Number), [h2,m2]=String(p.hasta).split(':').map(Number);
  const a=h1*60+(m1||0), b=h2*60+(m2||0);
  if(isNaN(a)||isNaN(b)) return true;
  const ah=new Date(), m=ah.getHours()*60+ah.getMinutes();
  return a<=b ? (m>=a&&m<=b) : (m>=a||m<=b);   // también vale de noche (22:00–02:00)
}
// Promo con días: p.dias = días de la semana (0=domingo…6=sábado) o p.fecha = un día concreto (AAAA-MM-DD).
// Sin nada de eso, la promo vale todos los días (como hasta ahora).
const DIAS_NOM=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
function hoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function promoEnDia(p){
  if(p.fecha) return String(p.fecha)===hoyISO();
  if(Array.isArray(p.dias)&&p.dias.length) return p.dias.includes(new Date().getDay());
  return true;
}
// Una promo de fecha concreta ya pasada no se enseña en ningún sitio
function promoCaducada(p){ return !!p.fecha && String(p.fecha)<hoyISO(); }
function diasTexto(dias){
  if(!Array.isArray(dias)||!dias.length||dias.length===7) return 'Todos los días';
  return 'Los '+dias.slice().sort().map(d=>DIAS_NOM[d]+'s').join(' y ');
}
function fechaBonita(f){ try{ return new Date(f+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}); }catch(e){ return f; } }
// Etiqueta de estado de una promo en la pestaña 🎉 Promos
function estadoPromoVista(p){
  const horas=p.desde&&p.hasta?' · '+esc(p.desde)+'–'+esc(p.hasta):'';
  if(!promoEnDia(p)){
    if(p.fecha) return '<span class="vp-estado">📅 '+esc(fechaBonita(p.fecha))+horas+'</span>';
    return '<span class="vp-estado">🗓 '+esc(diasTexto(p.dias))+horas+'</span>';
  }
  if(p.desde&&p.hasta)
    return promoEnHora(p)
      ? '<span class="vp-estado ahora">● Ahora mismo · hasta las '+esc(p.hasta)+'</span>'
      : '<span class="vp-estado">🕗 Hoy de '+esc(p.desde)+' a '+esc(p.hasta)+'</span>';
  if(p.fecha) return '<span class="vp-estado ahora">● Solo hoy</span>';
  if(Array.isArray(p.dias)&&p.dias.length&&p.dias.length<7) return '<span class="vp-estado ahora">● Hoy '+esc(DIAS_NOM[new Date().getDay()])+'</span>';
  return '';
}
// El precio de una promo lleva SIEMPRE el €: si Stalin escribe "1", se enseña "1 €"
function conEuro(v){
  v=(v==null?'':String(v)).trim();
  if(!v) return '';
  return /€/.test(v) ? v : v+' €';
}
function promosHTML(promos){
  const act=(promos||[]).filter(p=>p&&p.titulo&&p.activa!==false&&promoEnDia(p)&&promoEnHora(p));
  if(!act.length) return '';
  return `<section class="promos-zona no-print">
    <div class="cab" onclick="verPestana('promos')" style="cursor:pointer" title="Ver todas las promociones"><h2>Promociones<span class="en">Offers · Ver todas ›</span></h2></div>
    <div class="promos-lista">${act.map(p=>`<div class="promo-card${act.length===1?' sola':''}">
      ${p.icono?'<div style="font-size:26px;line-height:1;margin-bottom:7px">'+esc(p.icono)+'</div>':''}
      <div class="promo-nom">${esc(p.titulo)}</div>
      ${p.en?'<div class="promo-en">'+esc(p.en)+'</div>':''}
      ${p.desc?'<div class="promo-desc">'+esc(p.desc)+'</div>':''}
      ${p.precio?'<div class="promo-precio">'+esc(conEuro(p.precio))+'</div>':''}
      ${p.desde&&p.hasta?'<div style="margin-top:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cdbf9f;font-family:Georgia,serif">🕗 Hoy '+esc(p.desde)+' – '+esc(p.hasta)+'</div>':(p.fecha?'<div style="margin-top:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cdbf9f;font-family:Georgia,serif">📅 Solo hoy</div>':'')}
    </div>`).join('')}</div>
  </section>`;
}
function redesHTML(r){
  if(!r) return '';
  const items=[];
  if(r.instagram) items.push(`<a href="${esc(r.instagram)}" target="_blank" rel="noopener">📷 Instagram</a>`);
  if(r.tiktok) items.push(`<a href="${esc(r.tiktok)}" target="_blank" rel="noopener">🎵 TikTok</a>`);
  if(r.facebook) items.push(`<a href="${esc(r.facebook)}" target="_blank" rel="noopener">👍 Facebook</a>`);
  if(r.whatsapp) items.push(`<a href="${esc(r.whatsapp)}" target="_blank" rel="noopener">💬 WhatsApp</a>`);
  return items.length?`<div class="redes">${items.join('')}</div>`:'';
}
async function cargarCarta(){
  let carta = window.CARTA_DEFECTO;
  try{
    const r = await fetch('/api/datos?cartaweb='+ID_CARTA+'&t='+Date.now());
    const j = await r.json();
    if(j.existe && j.carta && Array.isArray(j.carta.secciones)) carta = j.carta;
  }catch(e){}
  pintar(carta);
  estadoAvisos();
}
cargarCarta();

// ── AVISOS DE PROMOCIONES (notificaciones al móvil del cliente) ──
const CLAVE_AVISOS = "BOeVjJvIFCUGI-TRZkebiwMEnXKolDq8PinCh1tlUkFswql89dDUiy4gonmv7Qba3EdymP3AqRUsaxCIdo6lprs";
function b64aBytes(s){
  const pad='='.repeat((4-s.length%4)%4);
  const raw=atob((s+pad).replace(/-/g,'+').replace(/_/g,'/'));
  const a=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)a[i]=raw.charCodeAt(i);
  return a;
}
const botonesAvisos=()=>[...document.querySelectorAll('.avisos-btn')];
function estadoAvisos(){
  if(('Notification' in window)&&Notification.permission==='granted'&&localStorage.getItem('carta_avisos')==='1'){
    botonesAvisos().forEach(b=>{ b.textContent='🔔 Avisos activados ✓'; b.disabled=true; });
  }
}
async function activarAvisos(){
  const b={ set disabled(v){ botonesAvisos().forEach(x=>x.disabled=v); } };
  if(!('Notification' in window)||!('serviceWorker' in navigator)||!('PushManager' in window)){
    if(esiOS) alert('Para recibir avisos en el iPhone:\n1. Pulsa Compartir (el cuadrito con la flecha ↑).\n2. Elige "Añadir a pantalla de inicio".\n3. Abre la Carta desde ese icono y pulsa otra vez "Avísame".');
    else alert('Este navegador no admite avisos.');
    return;
  }
  try{
    if(b) b.disabled=true;
    const permiso=await Notification.requestPermission();
    if(permiso!=='granted'){ if(b) b.disabled=false; alert('No diste permiso para los avisos. Puedes activarlos cuando quieras desde los ajustes del navegador.'); return; }
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64aBytes(CLAVE_AVISOS)});
    const j=sub.toJSON();
    const r=await fetch('/api/avisos',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({accion:'suscribir',carta:ID_CARTA,sub:{endpoint:j.endpoint,keys:j.keys}})});
    if(!r.ok) throw new Error('servidor');
    localStorage.setItem('carta_avisos','1');
    estadoAvisos();
  }catch(e){ if(b) b.disabled=false; alert('No pude activar los avisos. Inténtalo otra vez.'); }
}
// La carta se repinta sola cada minuto: los botones se enganchan por delegación
document.addEventListener('click',e=>{ const t=e.target.closest&&e.target.closest('.avisos-btn'); if(t&&!t.disabled) activarAvisos(); });

// ── POP-UP AUTOMÁTICO: preguntar si quiere los avisos (sin que tenga que buscarlo) ──
function puedePreguntarAvisos(){
  if(localStorage.getItem('carta_avisos')==='1') return false;                    // ya los tiene
  if(!('Notification' in window)||!('serviceWorker' in navigator)||!('PushManager' in window)) return false; // iPhone sin instalar: primero sale el aviso de instalar
  if(Notification.permission==='denied') return false;                            // los rechazó en el navegador
  const no=+localStorage.getItem('carta_avisos_no')||0;                           // dijo "ahora no" hace poco
  if(no && (Date.now()-no) < 7*24*3600*1000) return false;                        // se le vuelve a preguntar a los 7 días
  return true;
}
setTimeout(()=>{
  if(!puedePreguntarAvisos()) return;
  const inst=document.getElementById('instalar');
  if(inst && inst.style.display==='flex') return;                                 // no encimar dos avisos
  document.getElementById('popup-avisos').style.display='flex';
}, 5000);
document.getElementById('btn-avisos-si').onclick=async()=>{
  document.getElementById('popup-avisos').style.display='none';
  await activarAvisos();
};
document.getElementById('btn-avisos-no').onclick=()=>{
  document.getElementById('popup-avisos').style.display='none';
  localStorage.setItem('carta_avisos_no', String(Date.now()));
};
// Enlace directo a la pestaña de promos: carta-paraiso.html#promos
if(location.hash==='#promos') verPestana('promos');

// TIEMPO REAL: al volver a la carta (o cada 60 s si está abierta), recarga los datos
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'){ cargarCarta(); comprobarVersion(); } });
setInterval(()=>{ if(document.visibilityState==='visible'){ cargarCarta(); comprobarVersion(); } }, 60000);

// ACTUALIZACIÓN AUTOMÁTICA DE LA APP: si se publica una carta nueva (pestañas,
// mejoras…), la página se recarga sola — el cliente siempre ve la última versión
// sin tener que cerrar la app ni borrar nada.
let HUELLA_CARTA=null;
async function comprobarVersion(){
  try{
    const r=await fetch('/carta-paraiso.html',{method:'HEAD',cache:'no-store'});
    const h=r.headers.get('etag')||r.headers.get('last-modified');
    if(!h) return;
    if(HUELLA_CARTA===null){ HUELLA_CARTA=h; return; }
    if(h!==HUELLA_CARTA) location.reload();
  }catch(e){}
}
comprobarVersion();

// INSTALABLE como app: registrar el service worker
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/carta-sw.js').catch(()=>{}); }
// Botón "Instalar" en Android/Chrome
let promptInstalar=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); promptInstalar=e; document.getElementById('instalar').style.display='flex'; });
document.getElementById('btn-instalar').onclick=async()=>{
  if(promptInstalar){ promptInstalar.prompt(); await promptInstalar.userChoice; promptInstalar=null; document.getElementById('instalar').style.display='none'; }
  else { alert('Para instalarla en el iPhone:\n1. Pulsa el botón Compartir (el cuadrito con la flecha ↑).\n2. Elige "Añadir a pantalla de inicio".\n\nEn Android: menú ⋮ → "Instalar aplicación".'); }
};
// En iPhone (Safari) no hay botón automático: mostrar el aviso con instrucciones si no está ya instalada
const esiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const yaApp=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
if(esiOS && !yaApp){ setTimeout(()=>{ document.getElementById('instalar').style.display='flex'; }, 2500); }
</script>
