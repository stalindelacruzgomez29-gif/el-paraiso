<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carta · El Paraíso Bar Restaurante</title>
<link rel="manifest" href="/carta.webmanifest">
<meta name="theme-color" content="#123f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carta Paraíso">
<link rel="apple-touch-icon" href="/carta-icono-180.png">
<link rel="icon" href="/carta-icono-192.png">
<style>
  :root{
    --verde:#123f2e; --verde-hoja:#1d5a41; --oro:#b4884a; --oro-claro:#cba15f;
    --papel:#f6efe0; --papel-2:#efe6d2; --tinta:#2a2a24; --tinta-suave:#6b6656; --linea:#d8ccb0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--papel);color:var(--tinta);font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;line-height:1.45}
  .lienzo{max-width:860px;margin:0 auto}

  .barra-print{text-align:center;padding:12px;background:var(--verde-hoja);color:#fff;font-family:Georgia,serif;font-size:14px}
  .barra-print button{background:var(--oro);color:#2a1c08;border:0;padding:9px 18px;border-radius:8px;font-weight:700;cursor:pointer;margin-left:8px}

  /* PORTADA */
  .portada{background:radial-gradient(120% 80% at 50% -10%, #1a5540 0%, var(--verde) 55%, #0d3123 100%);
    color:var(--papel);text-align:center;padding:56px 30px 46px;border-bottom:6px double var(--oro)}
  .emblema{width:104px;height:104px;margin:0 auto 18px;display:block}
  .marca{font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:var(--oro-claro);margin-bottom:12px;font-family:Georgia,serif}
  .titulo{font-size:clamp(38px,10vw,60px);line-height:.98;font-weight:400;letter-spacing:.02em}
  .titulo .the{display:block;font-size:.34em;letter-spacing:.55em;color:var(--oro-claro);margin-bottom:.35em;text-transform:uppercase}
  .desde{display:inline-block;margin-top:16px;padding:6px 20px;border:1px solid var(--oro);border-radius:40px;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--oro-claro);font-family:Georgia,serif}
  .lema{margin-top:16px;font-style:italic;font-size:17px;color:#e9dfc6}

  main{padding:34px 30px 16px}
  /* doble columna para aprovechar el papel */
  .cols{column-count:2;column-gap:34px}
  @media(max-width:640px){.cols{column-count:1}}

  .seccion{break-inside:avoid;margin-bottom:26px;display:inline-block;width:100%}
  .cab{text-align:center;margin-bottom:12px}
  .cab h2{font-size:21px;font-weight:400;color:var(--verde);letter-spacing:.03em;display:inline-flex;align-items:center;gap:12px}
  .cab h2::before,.cab h2::after{content:"";width:24px;height:1px;background:var(--oro);opacity:.7}
  .cab .en{display:block;margin-top:3px;font-family:Georgia,serif;font-style:italic;font-size:12px;color:var(--tinta-suave)}

  .plato{padding:8px 0;border-bottom:1px dotted var(--linea);break-inside:avoid}
  .plato:last-child{border-bottom:none}
  .fila{display:grid;grid-template-columns:1fr auto;gap:4px 12px;align-items:baseline}
  .pl-nom{font-size:15.5px;color:var(--tinta)}
  .pl-en{font-family:Georgia,serif;font-style:italic;font-size:11.5px;color:var(--tinta-suave)}
  .pl-desc{font-family:Georgia,serif;font-size:11.5px;color:var(--tinta-suave);line-height:1.4;margin-top:1px}
  .pl-precio{font-size:14.5px;color:var(--verde);font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums;text-align:right}
  .pl-precio .multi{font-size:11px;color:var(--oro);font-weight:400}
  /* plato con foto */
  .con-foto{display:grid;grid-template-columns:64px 1fr;gap:12px;align-items:center}
  .con-foto .foto{width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--linea)}

  .premium{background:linear-gradient(160deg,#fbf6ea,#f1e7cf);border:1px solid var(--oro);border-radius:14px;padding:18px 18px 8px}
  .premium .pl-nom{font-weight:700}
  .estrella{color:var(--oro);font-size:11px;letter-spacing:.3em;text-transform:uppercase;display:block;text-align:center;margin-bottom:6px}
  .kids{background:var(--papel-2);border-radius:12px;padding:16px 18px}

  .pie{background:var(--verde);color:var(--papel);text-align:center;padding:28px 30px 34px;margin-top:14px;border-top:6px double var(--oro)}
  .pie .datos{display:flex;justify-content:center;gap:12px 26px;flex-wrap:wrap;font-size:14px}
  .pie .datos b{color:var(--oro-claro);font-weight:400}
  .pie .alerg{margin-top:14px;font-family:Georgia,serif;font-style:italic;font-size:11.5px;color:#cdbf9f;max-width:520px;margin:14px auto 0;line-height:1.5}
  .pie .grx{margin-top:12px;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--oro-claro)}
  .redes{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:16px}
  .redes a{display:inline-flex;align-items:center;gap:6px;background:rgba(203,161,95,.14);border:1px solid var(--oro);color:var(--oro-claro);
    padding:8px 15px;border-radius:30px;font-family:-apple-system,sans-serif;font-size:13.5px;font-weight:600;text-decoration:none}
  .redes a:hover{background:rgba(203,161,95,.26)}
  /* aviso instalar app */
  .instalar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:60;background:var(--verde);color:#fff;
    display:none;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;box-shadow:0 8px 26px rgba(0,0,0,.3);font-family:-apple-system,sans-serif;max-width:92vw}
  .instalar img{width:38px;height:38px;border-radius:9px}
  .instalar .txt{font-size:13.5px;line-height:1.3}
  .instalar b{color:var(--oro-claro)}
  .instalar button{background:var(--oro);color:#2a1c08;border:0;padding:9px 15px;border-radius:9px;font-weight:700;cursor:pointer;white-space:nowrap}
  .instalar .cerrar{background:transparent;color:#cdbf9f;font-size:20px;padding:0 4px}

  @media print{
    @page{size:A4;margin:9mm}
    body{background:#fff}
    .lienzo{max-width:none}
    .no-print{display:none!important}
    .portada,.pie,.premium,.kids,.con-foto .foto{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    main{padding:16px 6px 6px}
    .cols{column-gap:22px}
    .seccion{margin-bottom:16px}
    .portada{padding:26px 20px 22px}
    .emblema{width:74px;height:74px}
  }
</style>
</head>
<body>
<div class="barra-print no-print">📄 Tu carta · <button onclick="window.print()">🖨 Imprimir / PDF</button> <button onclick="location.href='editar-carta.html'" style="background:#1d5a41;color:#fff">✏️ Editar la carta</button></div>

<div class="lienzo" id="lienzo">
  <div style="text-align:center;padding:60px;color:#8b8b7a">Cargando la carta…</div>
</div>

<div class="instalar no-print" id="instalar">
  <img src="/carta-icono-192.png" alt="">
  <div class="txt">Guarda la <b>Carta El Paraíso</b> en tu móvil</div>
  <button id="btn-instalar">📲 Instalar</button>
  <button class="cerrar" onclick="document.getElementById('instalar').style.display='none'">×</button>
</div>

<script src="carta-datos.js"></script>
<script>
const ID_CARTA = "4495a9d146be62a0d3e18df04b424802dd4f6e8a686403b8e5439844826205f9";
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function emblemaSVG(){
  return `<svg class="emblema" viewBox="0 0 120 120" aria-hidden="true">
    <circle cx="60" cy="60" r="57" fill="none" stroke="#b4884a" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#b4884a" stroke-width=".6" opacity=".6"/>
    <g fill="#cba15f"><path d="M60 92c-2-14-3-26-2-40l4 0c1 14 0 26-2 40z"/>
    <path d="M60 50c-10-9-22-11-32-6 9-1 19 2 27 9-11-4-22-2-30 5 10-4 20-3 29 3-9 1-17 6-21 14 8-8 18-11 27-9-4-6-3-13 0-20z"/>
    <path d="M60 50c10-9 22-11 32-6-9-1-19 2-27 9 11-4 22-2 30 5-10-4-20-3-29 3 9 1 17 6 21 14-8-8-18-11-27-9 4-6 3-13 0-20z" opacity=".8"/>
    <circle cx="60" cy="47" r="4"/></g></svg>`;
}
function platoHTML(p){
  const filaTxt = `<div class="fila"><div><div class="pl-nom">${esc(p.nom)}${p.en?' <span class="pl-en">· '+esc(p.en)+'</span>':''}</div>${p.desc?'<div class="pl-desc">'+esc(p.desc)+'</div>':''}</div>
    <div class="pl-precio">${esc(p.precio)}</div></div>`;
  if(p.foto) return `<div class="plato"><div class="con-foto"><img class="foto" src="${p.foto}" alt="${esc(p.nom)}">${filaTxt}</div></div>`;
  return `<div class="plato">${filaTxt}</div>`;
}
function seccionHTML(s){
  const clase = s.estilo==='premium'?'seccion premium':(s.estilo==='kids'?'seccion kids':'seccion');
  return `<section class="${clase}">
    ${s.nota?'<span class="estrella">'+esc(s.nota)+'</span>':''}
    <div class="cab"><h2>${esc(s.titulo)}${s.en?'<span class="en">'+esc(s.en)+'</span>':''}</h2></div>
    ${(s.platos||[]).map(platoHTML).join('')}
  </section>`;
}
function pintar(c){
  document.title = 'Carta · '+(c.nombre||'El Paraíso');
  document.getElementById('lienzo').innerHTML = `
    <header class="portada">${emblemaSVG()}
      <div class="marca">Bar · Restaurante</div>
      <h1 class="titulo"><span class="the">El</span>${esc((c.nombre||'El Paraíso').replace(/^El\s+/i,'').toUpperCase())}</h1>
      <div class="desde">Desde ${esc(c.desde||'1968')}</div>
      <p class="lema">${esc(c.lema||'')}</p>
    </header>
    <main><div class="cols">${(c.secciones||[]).map(seccionHTML).join('')}</div></main>
    <footer class="pie">
      <div class="datos">${c.contacto&&c.contacto.tel?'<span>📞 <b>'+esc(c.contacto.tel)+'</b></span>':''}
        ${c.contacto&&c.contacto.horario?'<span>🕗 <b>'+esc(c.contacto.horario)+'</b></span>':''}
        ${c.contacto&&c.contacto.web?'<span>🌐 <b>'+esc(c.contacto.web)+'</b></span>':''}</div>
      ${redesHTML(c.contacto&&c.contacto.redes)}
      <p class="alerg">Si tienes alguna alergia o intolerancia alimentaria, pregunta a nuestro personal. · Please inform our staff of any food allergy or intolerance. IVA incluido.</p>
      <div class="grx">El Paraíso · Desde ${esc(c.desde||'1968')}</div>
    </footer>`;
}
function redesHTML(r){
  if(!r) return '';
  const items=[];
  if(r.instagram) items.push(`<a href="${esc(r.instagram)}" target="_blank" rel="noopener">📷 Instagram</a>`);
  if(r.tiktok) items.push(`<a href="${esc(r.tiktok)}" target="_blank" rel="noopener">🎵 TikTok</a>`);
  if(r.facebook) items.push(`<a href="${esc(r.facebook)}" target="_blank" rel="noopener">👍 Facebook</a>`);
  if(r.whatsapp) items.push(`<a href="${esc(r.whatsapp)}" target="_blank" rel="noopener">💬 WhatsApp</a>`);
  return items.length?`<div class="redes">${items.join('')}</div>`:'';
}
async function cargarCarta(){
  let carta = window.CARTA_DEFECTO;
  try{
    const r = await fetch('/api/datos?cartaweb='+ID_CARTA+'&t='+Date.now());
    const j = await r.json();
    if(j.existe && j.carta && Array.isArray(j.carta.secciones)) carta = j.carta;
  }catch(e){}
  pintar(carta);
}
cargarCarta();

// TIEMPO REAL: al volver a la carta (o cada 60 s si está abierta), recarga los datos
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') cargarCarta(); });
setInterval(()=>{ if(document.visibilityState==='visible') cargarCarta(); }, 60000);

// INSTALABLE como app: registrar el service worker
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/carta-sw.js').catch(()=>{}); }
// Botón "Instalar" en Android/Chrome
let promptInstalar=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); promptInstalar=e; document.getElementById('instalar').style.display='flex'; });
document.getElementById('btn-instalar').onclick=async()=>{
  if(promptInstalar){ promptInstalar.prompt(); await promptInstalar.userChoice; promptInstalar=null; document.getElementById('instalar').style.display='none'; }
  else { alert('Para instalarla en el iPhone:\n1. Pulsa el botón Compartir (el cuadrito con la flecha ↑).\n2. Elige "Añadir a pantalla de inicio".\n\nEn Android: menú ⋮ → "Instalar aplicación".'); }
};
// En iPhone (Safari) no hay botón automático: mostrar el aviso con instrucciones si no está ya instalada
const esiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const yaApp=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
if(esiOS && !yaApp){ setTimeout(()=>{ document.getElementById('instalar').style.display='flex'; }, 2500); }
</script>
</body>
</html>
