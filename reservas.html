<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reservar mesa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --verde: #1b5e20; --crema: #f6f9f4; }
  body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--crema); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .caja { background: #fff; border-radius: 18px; box-shadow: 0 10px 32px rgba(27,94,32,.14); max-width: 440px; width: 100%; padding: 26px; }
  .logo { display: block; margin: 0 auto 10px; max-height: 90px; max-width: 70%; }
  h1 { font-size: 21px; color: var(--verde); text-align: center; }
  .sub { text-align: center; color: #789; font-size: 14px; margin: 4px 0 18px; }
  label { display: block; font-size: 13px; font-weight: 700; color: #555; margin: 12px 0 4px; }
  .campo { width: 100%; padding: 12px; border: 1.5px solid #d7e3d7; border-radius: 10px; font-size: 16px; }
  .campo:focus { outline: none; border-color: var(--verde); }
  .fila { display: flex; gap: 10px; }
  .fila > div { flex: 1; }
  .btn { width: 100%; margin-top: 20px; padding: 14px; border: 0; border-radius: 12px; background: var(--verde); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
  .btn:disabled { background: #9bb89d; }
  .msj { display: none; margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 14.5px; line-height: 1.5; text-align: center; }
  .msj.ok { background: #def7ec; color: #03543f; }
  .msj.mal { background: #fde8e8; color: #9b1c1c; }
  .oculto-humanos { position: absolute; left: -5000px; }
  /* elegir platos (opcional) */
  details.sec { border: 1.5px solid #d7e3d7; border-radius: 10px; padding: 8px 12px; margin-bottom: 8px; background: #fff; }
  details.sec summary { cursor: pointer; font-weight: 700; color: var(--verde); font-size: 14px; }
  .pl-fila { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dotted #e2ece2; font-size: 14px; }
  .pl-fila:last-child { border-bottom: 0; }
  .pl-fila .nom { flex: 1; line-height: 1.3; }
  .pl-fila .precio { color: #789; font-size: 12.5px; white-space: nowrap; }
  .menos, .mas { width: 30px; height: 30px; flex: 0 0 30px; border-radius: 50%; border: 1.5px solid var(--verde); background: #fff; color: var(--verde); font-size: 17px; font-weight: 700; cursor: pointer; line-height: 1; }
  .cant { min-width: 20px; text-align: center; font-weight: 700; }
  #resumen-platos { display: none; margin-top: 8px; padding: 10px 12px; background: #def7ec; border-radius: 10px; font-size: 13.5px; color: #03543f; line-height: 1.5; }
</style>
</head>
<body>
<div class="caja">
  <a id="volver" href="carta-paraiso.html" style="display:none;color:var(--verde);text-decoration:none;font-weight:700;font-size:14px;margin-bottom:10px">← Volver a la carta</a>
  <img class="logo" id="logo" alt="">
  <h1 id="nombre-negocio">El Paraíso Bar Restaurante</h1>
  <p class="sub">Reserva tu mesa y te la confirmamos enseguida</p>

  <div id="form-reserva">
  <label>Tu nombre</label>
  <input class="campo" id="r-nombre" autocomplete="name" placeholder="Nombre y apellido">
  <label>Tu teléfono (te confirmamos por ahí)</label>
  <input class="campo" id="r-telefono" type="tel" autocomplete="tel" placeholder="600 000 000">
  <div class="fila">
    <div><label>Día</label><input class="campo" id="r-fecha" type="date"></div>
    <div><label>Hora</label><input class="campo" id="r-hora" type="time"><select class="campo" id="r-hora-sel" style="display:none"></select></div>
    <div style="flex:0 0 110px"><label>Personas</label><input class="campo" id="r-personas" type="number" min="1" max="40" value="2"></div>
  </div>
  <label>Algo que debamos saber (opcional)</label>
  <input class="campo" id="r-nota" placeholder="Terraza, trona, alergias, cumpleaños...">

  <div id="zona-platos" style="display:none">
    <label>🍽 ¿Ya sabéis qué vais a querer? (opcional)</label>
    <p style="font-size:12.5px;color:#789;margin-bottom:6px">Elegid platos de la carta y lo vamos preparando. En el local se puede cambiar sin problema.</p>
    <div id="lista-platos"></div>
    <div id="resumen-platos"></div>
  </div>

  <input class="oculto-humanos" id="r-web" tabindex="-1" autocomplete="off">

  <button class="btn" id="btn-reservar">📅 Pedir la reserva</button>
  </div>

  <!-- Consulta / anulación de una reserva ya hecha (se entra con el enlace ?ver=) -->
  <div id="zona-ver" style="display:none">
    <label>Tu teléfono (el de la reserva)</label>
    <input class="campo" id="v-telefono" type="tel" autocomplete="tel" placeholder="600 000 000">
    <button class="btn" id="btn-ver">🔎 Ver mi reserva</button>
    <div id="v-datos" style="display:none;margin-top:14px;padding:14px;background:#f2f8f2;border-radius:12px;font-size:15px;line-height:1.8"></div>
    <button class="btn" id="btn-anular" style="display:none;background:#c62828">❌ Anular esta reserva</button>
  </div>

  <div class="msj" id="msj"></div>
  <div id="post-reserva" style="display:none;margin-top:12px;font-size:14.5px;line-height:2;text-align:center"></div>
  <!-- Puente a la carta digital: la reserva y la carta son un mismo sistema -->
  <a id="enlace-carta" href="carta-paraiso.html" style="display:none;margin-top:16px;text-align:center;padding:12px;border:1.5px solid var(--verde);border-radius:12px;color:var(--verde);text-decoration:none;font-weight:700">🍽 Mira nuestra carta y nuestras promos</a>
</div>

<script>
const $ = s => document.querySelector(s);
const params = new URLSearchParams(location.search);
const local = ['paraiso', 'sazon'].includes(params.get('l')) ? params.get('l') : 'paraiso';
// Si vienen desde la carta (pestaña 📅 Reservar), enseñamos el botón de volver
if (params.get('volver') === 'carta') $('#volver').style.display = 'inline-block';
// Y si NO vienen de la carta, les enseñamos el puente hacia ella (solo en El Paraíso,
// no en las apps clonadas de otros negocios, que tienen su propia carta o ninguna)
if (params.get('volver') !== 'carta' && location.hostname === 'el-paraiso-eight.vercel.app') {
  document.getElementById('enlace-carta').style.display = 'block';
}

// Nombre y logo del local (si el negocio subió su propio logo, se usa ese)
const NOMBRES = { paraiso: 'El Paraíso Bar Restaurante', sazon: 'El Sazón de Quisqueya' };
const LOGOS_FIJOS = { paraiso: '/equipo/logo-fondo.png', sazon: '/equipo/logo-sazon.png' };
$('#nombre-negocio').textContent = NOMBRES[local] || NOMBRES.paraiso;
document.title = 'Reservar mesa · ' + $('#nombre-negocio').textContent;
$('#logo').src = '/api/equipo?logo=' + local;
$('#logo').onerror = () => { $('#logo').onerror = null; $('#logo').src = LOGOS_FIJOS[local] || LOGOS_FIJOS.paraiso; };

// El día no puede ser anterior a hoy
$('#r-fecha').min = new Date().toLocaleDateString('sv-SE');
$('#r-fecha').value = new Date().toLocaleDateString('sv-SE');

// ¿Por qué canal ha llegado el cliente? (google, instagram, facebook, whatsapp, qr...)
// Cada enlace que reparte el local lleva su ?o=; así el jefe sabe qué canal le trae reservas.
const origen = ['google', 'instagram', 'facebook', 'whatsapp', 'carta', 'qr'].includes(params.get('o'))
  ? params.get('o')
  : ((params.get('volver') === 'carta' || params.get('promo')) ? 'carta' : 'web');

// ── HORAS POR TRAMOS: si el local configuró sus franjas, la hora se elige de una
// lista (y las horas ya completas salen bloqueadas). Si no, campo de hora libre. ──
async function cargarHoras() {
  try {
    const r = await fetch('/api/equipo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accion: 'infoReservas', local, fecha: $('#r-fecha').value })
    });
    const j = await r.json();
    const sel = $('#r-hora-sel');
    if (j.cerrado) {   // ese día de la semana el local no abre
      sel.innerHTML = '<option value="">😴 Ese día estamos cerrados — elige otro día</option>';
      $('#r-hora').style.display = 'none';
      sel.style.display = 'block';
      return;
    }
    if (!j.horas || !j.horas.length) {   // el local no puso franjas: hora libre
      sel.style.display = 'none';
      $('#r-hora').style.display = 'block';
      return;
    }
    const antes = sel.value;
    const llenas = j.llenas || [];
    sel.innerHTML = '<option value="">Elige la hora…</option>' +
      j.horas.map(h => `<option value="${h}" ${llenas.includes(h) ? 'disabled' : ''}>${h}${llenas.includes(h) ? ' — completa' : ''}</option>`).join('');
    if (antes && j.horas.includes(antes) && !llenas.includes(antes)) sel.value = antes;
    $('#r-hora').style.display = 'none';
    sel.style.display = 'block';
  } catch (e) { /* si falla, se queda el campo de hora libre */ }
}
$('#r-fecha').addEventListener('change', cargarHoras);
cargarHoras();
function horaElegida() {
  return $('#r-hora-sel').style.display !== 'none' ? $('#r-hora-sel').value : $('#r-hora').value;
}

// Si vienen de tocar "📅 Reservar" en una promoción, la apuntamos en la nota
const promoElegida = (params.get('promo') || '').slice(0, 80);
if (promoElegida) $('#r-nota').value = 'Promo: ' + promoElegida;

// ── ELEGIR PLATOS (opcional): carga la carta digital y deja marcar cantidades ──
const esc = s => (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const ID_CARTA = '4244bca40f5248ee217447ae96196df2b63dd8d0c83bad2e01995251a87329ba';
const PEDIDO = {};   // clave "seccion|plato" → {nom, precio, cant}
async function cargarPlatos() {
  if (local !== 'paraiso') return;   // la carta digital es la de El Paraíso
  try {
    const r = await fetch('/api/datos?cartaweb=' + ID_CARTA + '&t=' + Date.now());
    const j = await r.json();
    const secs = (j.existe && j.carta && j.carta.secciones) || [];
    if (!secs.length) return;
    $('#lista-platos').innerHTML = secs.map((s, si) => `
      <details class="sec">
        <summary>${esc(s.titulo)}</summary>
        ${(s.platos || []).map((pl, pi) => `
          <div class="pl-fila">
            <span class="nom">${esc(pl.nom)}</span>
            <span class="precio">${esc(pl.precio || '')}</span>
            <button type="button" class="menos" onclick="cambiaPlato(${si},${pi},-1)">−</button>
            <span class="cant" id="c-${si}-${pi}">0</span>
            <button type="button" class="mas" onclick="cambiaPlato(${si},${pi},1)">+</button>
          </div>`).join('')}
      </details>`).join('');
    window._SECS = secs;
    $('#zona-platos').style.display = 'block';
  } catch (e) {}
}
window.cambiaPlato = (si, pi, d) => {
  const pl = window._SECS[si].platos[pi];
  const k = si + '|' + pi;
  const ahora = Math.min(40, Math.max(0, ((PEDIDO[k] && PEDIDO[k].cant) || 0) + d));
  if (ahora === 0) delete PEDIDO[k];
  else PEDIDO[k] = { nom: pl.nom, precio: pl.precio || '', cant: ahora };
  document.getElementById('c-' + si + '-' + pi).textContent = ahora;
  const lista = Object.values(PEDIDO);
  const caja = $('#resumen-platos');
  if (lista.length) {
    caja.style.display = 'block';
    caja.innerHTML = '🍽 <b>Vuestro pedido:</b> ' + lista.map(x => x.cant + '× ' + esc(x.nom)).join(' · ');
  } else caja.style.display = 'none';
};
cargarPlatos();

function msj(tipo, texto) { const m = $('#msj'); m.className = 'msj ' + tipo; m.style.display = 'block'; m.textContent = texto; }

$('#btn-reservar').onclick = async () => {
  const btn = $('#btn-reservar'); btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const fecha = $('#r-fecha').value, hora = horaElegida();
    if (!hora) throw new Error('Elige la hora de la lista.');
    const r = await fetch('/api/equipo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        accion: 'crearReserva', local, origen,
        nombre: $('#r-nombre').value, telefono: $('#r-telefono').value,
        personas: $('#r-personas').value, fecha,
        hora, nota: $('#r-nota').value,
        platos: Object.values(PEDIDO), web: $('#r-web').value
      })
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'No se pudo enviar. Prueba de nuevo.');
    msj('ok', '🎉 ' + j.mensaje);
    btn.style.display = 'none';
    // Le dejamos su enlace para ver o anular la reserva, y el botón de calendario
    if (j.id) {
      const verUrl = location.origin + '/reservas.html?l=' + local + '&ver=' + encodeURIComponent(j.id);
      const ini = new Date(fecha + 'T' + hora);
      const fin = new Date(ini.getTime() + 2 * 3600 * 1000);
      const fCal = d => d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0') +
        'T' + String(d.getHours()).padStart(2, '0') + String(d.getMinutes()).padStart(2, '0') + '00';
      const cal = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' +
        encodeURIComponent('Reserva · ' + $('#nombre-negocio').textContent) +
        '&dates=' + fCal(ini) + '/' + fCal(fin) +
        '&details=' + encodeURIComponent('Mesa para ' + $('#r-personas').value + '. Ver o anular: ' + verUrl);
      const post = $('#post-reserva');
      post.style.display = 'block';
      post.innerHTML =
        `<a href="${verUrl}" style="color:var(--verde);font-weight:700">🔎 Ver o anular mi reserva</a><br>` +
        `<a href="${cal}" target="_blank" rel="noopener" style="color:var(--verde);font-weight:700">📆 Añadir a mi calendario</a><br>` +
        `<span style="color:#789;font-size:13px">Guarda esta página en favoritos por si hay algún cambio.</span>`;
    }
  } catch (e) { msj('mal', e.message); }
  btn.disabled = false; btn.textContent = '📅 Pedir la reserva';
};

// ── MODO "VER MI RESERVA": se entra con el enlace ?ver=<id> que damos al reservar.
// El cliente pone su teléfono y puede ver el estado o anular la mesa él mismo. ──
const verId = params.get('ver');
if (verId) {
  $('#form-reserva').style.display = 'none';
  $('#zona-ver').style.display = 'block';
  document.querySelector('.sub').textContent = 'Consulta o anula tu reserva';
  const ESTADOS = {
    pendiente: '🕐 Pendiente de confirmar (te avisamos enseguida)',
    confirmada: '✅ CONFIRMADA — ¡te esperamos!',
    anulada: '❌ Anulada',
    noVino: '❌ Cerrada'
  };
  let reservaVista = null;
  $('#btn-ver').onclick = async () => {
    const btn = $('#btn-ver'); btn.disabled = true;
    try {
      const r = await fetch('/api/equipo', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'verReserva', local, id: verId, telefono: $('#v-telefono').value })
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'No se pudo consultar. Prueba de nuevo.');
      reservaVista = j.reserva;
      const rv = j.reserva;
      const bonita = new Date(rv.fecha + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
      $('#v-datos').style.display = 'block';
      $('#v-datos').innerHTML =
        `<b>${ESTADOS[rv.estado] || rv.estado}</b><br>` +
        `👤 ${rv.nombre}<br>📅 ${bonita} a las ${rv.hora}<br>👥 ${rv.personas} persona${rv.personas == 1 ? '' : 's'}` +
        (rv.nota ? `<br>📝 ${rv.nota}` : '') +
        (rv.platos && rv.platos.length ? `<br>🍽 ${rv.platos.map(pl => pl.cant + '× ' + pl.nom).join(' · ')}` : '');
      const hoy = new Date().toLocaleDateString('sv-SE');
      $('#btn-anular').style.display = (rv.estado !== 'anulada' && rv.estado !== 'noVino' && rv.fecha >= hoy) ? 'block' : 'none';
      $('#msj').style.display = 'none';
    } catch (e) { msj('mal', e.message); }
    btn.disabled = false;
  };
  $('#btn-anular').onclick = async () => {
    if (!confirm('¿Seguro que quieres anular la reserva? La mesa quedará libre.')) return;
    const btn = $('#btn-anular'); btn.disabled = true;
    try {
      const r = await fetch('/api/equipo', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'anularReservaCliente', local, id: verId, telefono: $('#v-telefono').value })
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error || 'No se pudo anular. Llámanos y lo hacemos al momento.');
      msj('ok', j.mensaje);
      btn.style.display = 'none';
      $('#v-datos').style.display = 'none';
    } catch (e) { msj('mal', e.message); }
    btn.disabled = false;
  };
}
</script>
</body>
</html>
